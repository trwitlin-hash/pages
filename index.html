<!DOCTYPE html>
<html lang="en" style="color-scheme: light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light only">
  <title>Home - Classroom</title>
  <link rel="icon" type="image/png" sizes="64x64" href="favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; color-scheme: light; }
    body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #f9fafd; height: 100vh; overflow: hidden; color: #202124; }

    /* ── Top bar ── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 64px;
      background: transparent; border-bottom: none;
      display: flex; align-items: center; padding: 0 8px 0 0; z-index: 100; gap: 0;
    }
    .tb-icon-btn {
      width: 48px; height: 48px; border-radius: 50%; border: none;
      background: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: #444746; flex-shrink: 0; transition: background .15s;
    }
    .tb-icon-btn:hover { background: rgba(0,0,0,.1); }
    .brand { display: flex; align-items: center; gap: 4px; margin-left: 0; text-decoration: none;
      border-radius: 4px; padding: 4px 6px; transition: background .15s; }
    .brand:hover { background: rgba(0,0,0,.07); }
    .brand-name { font-size: 22px; color: #444746; font-weight: 400; white-space: nowrap; }
    .spacer { flex: 1; }
    .avatar-btn {
      width: 32px; height: 32px; border-radius: 50%; border: none;
      background: #e94235; color: #fff; font-size: 14px; font-weight: 500;
      cursor: pointer; margin: 0 8px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
    }
    .avatar-btn:hover { box-shadow: 0 0 0 2px rgba(0,0,0,.08), 0 0 0 4px rgba(233,66,53,.3); }

    /* ── Layout ── */
    .layout { display: flex; height: calc(100vh - 64px); margin-top: 64px; }

    /* ── Sidebar ── */
    .sidebar { width: 300px; flex-shrink: 0; padding: 8px 0; }
    .nav-divider { height: 1px; background: #e0e0e0; margin: 8px 14px; }
    .nav-item {
      display: flex; align-items: center; gap: 16px;
      height: 48px; padding: 0 20px;
      border-radius: 50px;
      cursor: pointer; color: #202124;
      font-size: 14px; font-weight: 500;
      margin: 4px 14px; user-select: none;
      transition: background .15s;
    }
    .nav-item:hover { background: #e8eaed; }
    .nav-item.active { background: #c9e6fd; color: #1967d2; }
    .nav-item.active:hover { background: #b8d8fc; }
    .nav-item svg { flex-shrink: 0; }
    .nav-item svg path, .nav-item svg circle { fill: #444746; }
    .nav-item:hover svg path, .nav-item:hover svg circle { fill: #444746; }
    .nav-item.active svg path, .nav-item.active svg circle { fill: #1967d2; }
    .nav-item.active:hover svg path, .nav-item.active:hover svg circle { fill: #1967d2; }

    /* ── Main ── */
    .main {
      flex: 1; background: #fff;
      border-radius: 32px 0 0 0;
      display: flex; align-items: flex-start; justify-content: center;
      padding-top: 80px;
    }
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 0 64px; gap: 0;
      text-align: center;
    }
    .empty-title { font-size: 18px; color: #202124; margin-bottom: 24px; font-weight: 400; }
    .empty-actions { display: flex; gap: 12px; align-items: center; }
    .btn-create {
      font-size: 14px; font-weight: 500; color: #1a73e8;
      background: none; border: none; cursor: pointer; padding: 9px 12px;
      border-radius: 4px; font-family: inherit; transition: background .15s;
    }
    .btn-create:hover { background: #d2e3fc; }
    .btn-join {
      background: #1a73e8; color: #fff; border: none;
      padding: 0 20px; height: 36px; border-radius: 18px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
      transition: background .15s, box-shadow .15s;
    }
    .btn-join:hover { background: #1557b0; box-shadow: 0 1px 3px rgba(0,0,0,.3); }

    /* ── Password overlay ── */
    .pw-overlay {
      display: none; position: fixed; inset: 0; z-index: 999;
      background: rgba(32,33,36,.5);
      align-items: center; justify-content: center;
    }
    .pw-overlay.open { display: flex; }
    .pw-box {
      background: #fff; border-radius: 8px;
      width: 360px; padding: 36px 24px 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.2), 0 8px 30px rgba(0,0,0,.15);
    }
    .pw-logo { display: flex; justify-content: center; margin-bottom: 16px; }
    .pw-title { font-size: 24px; font-weight: 400; color: #202124; text-align: center; margin-bottom: 8px; }
    .pw-sub { font-size: 14px; color: #5f6368; text-align: center; margin-bottom: 24px; }
    .pw-field { position: relative; margin-bottom: 4px; }
    .pw-input {
      width: 100%; padding: 13px 14px; font-size: 16px;
      border: 1px solid #dadce0; border-radius: 4px;
      outline: none; font-family: inherit; color: #202124;
      -webkit-text-security: disc; text-security: disc;
      background: #fff;
    }
    .pw-input:focus { border-color: #1a73e8; border-width: 2px; padding: 12px 13px; }
    .pw-input::placeholder { color: #80868b; }
    .pw-error { color: #d93025; font-size: 12px; min-height: 18px; margin: 4px 0 12px; }
    .pw-actions { display: flex; justify-content: space-between; align-items: center; }
    .pw-cancel {
      font-size: 14px; font-weight: 500; color: #1a73e8;
      background: none; border: none; cursor: pointer; padding: 9px 8px;
      border-radius: 4px; font-family: inherit;
    }
    .pw-cancel:hover { background: #e8f0fe; }
    .pw-next {
      background: #1a73e8; color: #fff; border: none;
      padding: 0 24px; height: 36px; border-radius: 4px;
      font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit;
    }
    .pw-next:hover { background: #1557b0; box-shadow: 0 1px 2px rgba(0,0,0,.3); }
    .pw-next:disabled { background: #f1f3f4; color: #bdc1c6; cursor: default; box-shadow: none; }
  </style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <!-- Hamburger -->
  <button class="tb-icon-btn" onclick="location.href='https://classroom.google.com'">
    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>

  <!-- Classroom logo + wordmark -->
  <a class="brand" href="https://classroom.google.com">
    <img src="classroom-icon.svg" width="28" height="28" alt="Classroom">
    <span class="brand-name">Classroom</span>
  </a>

  <div class="spacer"></div>

  <!-- + button → GC create/join dialog -->
  <button class="tb-icon-btn" onclick="location.href='https://classroom.google.com'">
    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
  </button>

  <!-- Apps grid → Google apps launcher -->
  <button class="tb-icon-btn" onclick="location.href='https://classroom.google.com'">
    <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M6 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 14c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM6 20c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6 0c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
  </button>

  <!-- Avatar — click to unlock -->
  <button class="avatar-btn" id="avatarBtn"><span class="material-symbols-sharp" style="font-size:20px;line-height:1;">person</span></button>
</header>

<!-- Body layout -->
<div class="layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <!-- Home (active) -->
    <div class="nav-item active" onclick="location.href='https://classroom.google.com/h'" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#1967d2" d="M12 3L4 9v12h16V9l-8-6zm6 16h-3v-6H9v6H6v-9l6-4.5 6 4.5v9z"/></svg>
      Home
    </div>

    <!-- Calendar -->
    <div class="nav-item" onclick="location.href='https://classroom.google.com/calendar/this-week/course/all'" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20a2 2 0 0 0 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z"/></svg>
      Calendar
    </div>

    <div style="height: 17px;"></div>

    <!-- Archived classes -->
    <div class="nav-item" onclick="location.href='https://classroom.google.com/h/archived'" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M20.54 5.23l-1.39-1.68C18.88 3.21 18.47 3 18 3H6c-.47 0-.88.21-1.16.55L3.46 5.23C3.17 5.57 3 6.02 3 6.5V19c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6.5c0-.48-.17-.93-.46-1.27zM6.24 5h11.52l.83 1H5.42l.82-1zM5 19V8h14v11H5zm11-5.5l-4 4-4-4 1.41-1.41L11 13.67V10h2v3.67l1.59-1.59L16 13.5z"/></svg>
      Archived classes
    </div>

    <!-- Settings -->
    <div class="nav-item" onclick="location.href='https://classroom.google.com/s'" style="cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#444746" d="M13.85 22.25h-3.7c-.74 0-1.36-.54-1.45-1.27l-.27-1.89c-.27-.14-.53-.29-.79-.46l-1.8.72c-.7.26-1.47-.03-1.81-.65L2.2 15.53c-.35-.66-.2-1.44.36-1.88l1.53-1.19c-.01-.15-.02-.3-.02-.46 0-.15.01-.31.02-.46l-1.52-1.19c-.59-.45-.74-1.26-.37-1.88l1.85-3.19c.34-.62 1.11-.9 1.79-.63l1.81.73c.26-.17.52-.32.78-.46l.27-1.91c.09-.7.71-1.25 1.44-1.25h3.7c.74 0 1.36.54 1.45 1.27l.27 1.89c.27.14.53.29.79.46l1.8-.72c.71-.26 1.48.03 1.82.65l1.84 3.18c.36.66.2 1.44-.36 1.88l-1.52 1.19c.01.15.02.3.02.46s-.01.31-.02.46l1.52 1.19c.56.45.72 1.23.37 1.86l-1.86 3.22c-.34.62-1.11.9-1.8.63l-1.8-.72c-.26.17-.52.32-.78.46l-.27 1.91c-.1.68-.72 1.22-1.46 1.22zm-3.23-2h2.76l.37-2.55.53-.22c.44-.18.88-.44 1.34-.78l.45-.34 2.38.96 1.38-2.4-2.03-1.58.07-.56c.03-.26.06-.51.06-.78s-.03-.53-.06-.78l-.07-.56 2.03-1.58-1.39-2.4-2.39.96-.45-.35c-.42-.32-.87-.58-1.33-.77l-.52-.22-.37-2.55h-2.76l-.37 2.55-.53.21c-.44.19-.88.44-1.34.79l-.45.33-2.38-.95-1.39 2.39 2.03 1.58-.07.56a7 7 0 0 0-.06.79c0 .26.02.53.06.78l.07.56-2.03 1.58 1.38 2.4 2.39-.96.45.35c.43.33.86.58 1.33.77l.53.22.38 2.55z"/><circle fill="#444746" cx="12" cy="12" r="3.5"/></svg>
      Settings
    </div>
  </nav>

  <!-- Main content — empty state -->
  <main class="main">
    <div class="empty-state">
      <img src="empty-state.svg" width="224" height="263" alt="" style="margin-bottom:16px">
      <div class="empty-title">All of your classes have been archived</div>
      <div class="empty-actions">
        <button class="btn-create" onclick="location.href='https://classroom.google.com'">Create class</button>
        <button class="btn-join" onclick="location.href='https://classroom.google.com'">Join class</button>
      </div>
    </div>
  </main>
</div>

<!-- Password overlay (avatar click) -->
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-box">
    <div class="pw-logo">
      <!-- Official Google logo from gstatic -->
      <svg xmlns="http://www.w3.org/2000/svg" width="74" height="24" viewBox="0 0 74 24"><path fill="#4285F4" d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.45-2.92-6.45-6.54s2.83-6.54 6.45-6.54c1.95 0 3.38.77 4.43 1.76L15.4 2.5C13.94 1.08 11.98 0 9.24 0 4.28 0 .11 4.04.11 9s4.17 9 9.13 9c2.68 0 4.7-.88 6.28-2.52 1.62-1.62 2.13-3.91 2.13-5.75 0-.57-.04-1.1-.13-1.54H9.24z"/><path fill="#EA4335" d="M25 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.46 5.83-5.81c0-3.37-2.62-5.81-5.83-5.81zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z"/><path fill="#4285F4" d="M53.58 7.49h-.09c-.57-.68-1.67-1.3-3.06-1.3C47.53 6.19 45 8.72 45 12c0 3.26 2.53 5.81 5.43 5.81 1.39 0 2.49-.62 3.06-1.32h.09v.81c0 2.22-1.19 3.41-3.1 3.41-1.56 0-2.53-1.12-2.93-2.07l-2.22.92c.64 1.54 2.33 3.43 5.15 3.43 2.99 0 5.52-1.76 5.52-6.05V6.49h-2.42v1zm-2.93 8.03c-1.76 0-3.1-1.5-3.1-3.52 0-2.05 1.34-3.52 3.1-3.52 1.74 0 3.1 1.5 3.1 3.54.01 2.03-1.36 3.5-3.1 3.5z"/><path fill="#FBBC05" d="M38 6.19c-3.21 0-5.83 2.44-5.83 5.81 0 3.34 2.62 5.81 5.83 5.81s5.83-2.46 5.83-5.81c0-3.37-2.62-5.81-5.83-5.81zm0 9.33c-1.76 0-3.28-1.45-3.28-3.52 0-2.09 1.52-3.52 3.28-3.52s3.28 1.43 3.28 3.52c0 2.07-1.52 3.52-3.28 3.52z"/><path fill="#34A853" d="M58 .24h2.51v17.57H58z"/><path fill="#EA4335" d="M68.26 15.52c-1.3 0-2.22-.59-2.82-1.76l7.77-3.21-.26-.66c-.48-1.3-1.96-3.7-4.97-3.7-2.99 0-5.48 2.35-5.48 5.81 0 3.26 2.46 5.81 5.76 5.81 2.66 0 4.2-1.63 4.84-2.57l-1.98-1.32c-.66.96-1.56 1.6-2.86 1.6zm-.18-7.15c1.03 0 1.91.53 2.2 1.28l-5.25 2.17c0-2.44 1.73-3.45 3.05-3.45z"/></svg>
    </div>
    <div class="pw-title">Sign in</div>
    <div class="pw-sub">to continue to Classroom</div>
    <div class="pw-field">
      <input type="text" class="pw-input" id="keyInput"
        placeholder="Enter your password"
        maxlength="32" autocomplete="off" spellcheck="false">
    </div>
    <div class="pw-error" id="errorMsg"></div>
    <div class="pw-actions">
      <button class="pw-cancel" id="cancelBtn">Cancel</button>
      <button class="pw-next" id="enterBtn">Next</button>
    </div>
  </div>
</div>

<script src="keys.js?v=4"></script>
<script src="auth.js?v=4"></script>
<script>
  lock();
  // Obscure this URL in browser history
  try { history.replaceState(null, "Google Classroom", location.href); } catch(e) {}

  const overlay = document.getElementById("pwOverlay");
  const input   = document.getElementById("keyInput");
  const btn     = document.getElementById("enterBtn");
  const cancel  = document.getElementById("cancelBtn");
  const err     = document.getElementById("errorMsg");

  document.getElementById("avatarBtn").addEventListener("click", () => {
    overlay.classList.add("open");
    setTimeout(() => input.focus(), 50);
  });

  cancel.addEventListener("click", () => {
    overlay.classList.remove("open");
    input.value = "";
    err.textContent = "";
  });

  function selfDestruct() { alert("nuh uh cuh"); location.replace("https://www.google.com/search?q=im+not+doing+my+work"); }

  // Pre-hash as the user types so attempt() can be fully synchronous.
  // window.open MUST be called synchronously (before any await) or browsers block it.
  let _hash = null, _hashFor = null;
  async function preHash() {
    const val = input.value.trim().toUpperCase();
    _hashFor = val;
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(val));
    const h = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
    if (_hashFor === val) _hash = h; // discard if input changed while hashing
  }
  input.addEventListener("input", preHash);

  function attempt() {
    err.textContent = "";
    btn.disabled = true;
    const val = input.value.trim().toUpperCase();
    if (val === "ARCADE2026" || val === "STUMPBROTHERS") { selfDestruct(); btn.disabled = false; return; }

    // Use pre-hashed value if ready, otherwise recompute (shouldn't happen in practice)
    const hash = (_hashFor === val && _hash) ? _hash : null;

    if (!hash) {
      // Hash not ready yet (extremely rare — user submitted before first keyup resolved)
      preHash().then(attempt);
      btn.disabled = false;
      return;
    }

    const keyInfo = KEYS[hash];
    const valid = keyInfo && (!keyInfo.expiry || keyInfo.expiry > Date.now()) &&
                  keyInfo.tier === requiredTier();

    if (valid) {
      // Store session synchronously
      sessionStorage.setItem("sgUnlockedSession", hash);
      sessionStorage.setItem("sgUnlockedTier", keyInfo.tier);
      // Open window NOW — still inside user gesture, no await before this
      const w = window.open("about:blank", "_blank");
      if (w) { launchCloaked(w).then(() => location.replace("https://classroom.google.com")); }
      else   { location.href = "loading.html"; }
    } else {
      err.textContent = "Wrong password. Try again.";
      input.focus(); input.select();
      btn.disabled = false;
    }
  }

  async function launchCloaked(w) {
    const base = location.origin;
    const hash = sessionStorage.getItem("sgUnlockedSession");
    const tier = sessionStorage.getItem("sgUnlockedTier");
    const html = await fetch("/loading.html").then(r => r.text());
    const fixed = html
      .replace(/\bsrc="(?!https?:\/\/|\/\/|\/)/g,  `src="${base}/`)
      .replace(/\bhref="(?!https?:\/\/|\/\/|\/|#)/g, `href="${base}/`);
    const seeded = fixed.replace("<head>", `<head><script>
sessionStorage.setItem("sgUnlockedSession","${hash}");
sessionStorage.setItem("sgUnlockedTier","${tier}");
<\/script>`);
    w.document.open(); w.document.write(seeded); w.document.close();
  }

  // Panic key — ` instantly goes to real Classroom
  document.addEventListener("keydown", e => { if (e.key === "`") location.replace("https://classroom.google.com"); });

  btn.addEventListener("click", attempt);
  input.addEventListener("keydown", e => { if (e.key === "Enter") attempt(); });
</script>
</body>
</html>
