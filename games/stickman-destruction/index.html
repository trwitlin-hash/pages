<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stickman Destruction</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1f1f1f; overflow: hidden; display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
    #gameContainer { width: 100%; height: 100%; }
    #unity-loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #fff; font-family: sans-serif; text-align: center; }
    #unity-progress-bar-empty { width: 200px; height: 4px; background: #444; border-radius: 2px; margin-top: 12px; }
    #unity-progress-bar-full { width: 0%; height: 100%; background: #6c63ff; border-radius: 2px; transition: width 0.2s; }
  </style>
</head>
<body>
  <div id="unity-loading-bar">
    <div>Loading Stickman Destruction...</div>
    <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
  </div>
  <div id="gameContainer"></div>
  <script src="Build/UnityLoader.js"></script>
  <script>
    function UnityProgress(gameInstance, progress) {
      var bar = document.getElementById("unity-progress-bar-full");
      if (bar) bar.style.width = (100 * progress) + "%";
      if (progress === 1) {
        var loading = document.getElementById("unity-loading-bar");
        if (loading) loading.style.display = "none";
      }
    }
    var gameInstance = UnityLoader.instantiate("gameContainer", "Build/game.json", { onProgress: UnityProgress });
  </script>
</body>
</html>
