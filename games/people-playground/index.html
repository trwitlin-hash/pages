<!DOCTYPE html>
<html lang="en-us">
  <!--comment-->
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>Unity WebGL Player | People Playground</title>
    <script src="/js/load.js"></script>
    <link rel="stylesheet" href="TemplateData/style.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }

      #unity-container {
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
      }
    </style>
  </head>

  <body>
    <div
      id="loading-text"
      style="
        color: black;
        font-size: 48px;
        font-family: cursive;
        text-align: center;
        margin-top: 20px;
      "
    >
      LOADING...
    </div>
    <div id="unity-container" class="unity-desktop" hidden>
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"></div>
    </div>
    <script>
      var container = document.querySelector('#unity-container');
      var canvas = document.querySelector('#unity-canvas');
      var loadingBar = document.querySelector('#unity-loading-bar');
      var progressBarFull = document.querySelector('#unity-progress-bar-full');
      var fullscreenButton = document.querySelector('#unity-fullscreen-button');
      var warningBanner = document.querySelector('#unity-warning');

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length
            ? 'block'
            : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning')
            div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      container.hidden = false;
      var buildUrl = 'Build';
      var loaderUrl = buildUrl + '/PPG.loader.js';
      var config = {
        dataUrl: buildUrl + '/PPG.data',
        frameworkUrl: buildUrl + '/PPG.framework.js',
        codeUrl: buildUrl + '/PPG.wasm',
        streamingAssetsUrl: 'StreamingAssets',
        companyName: 'Studio Minus',
        productName: 'People Playground',
        productVersion: '0',
      };
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content =
          'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = 'unity-mobile';
        canvas.className = 'unity-mobile';
      } else {
        function resizeCanvas() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          canvas.style.width = window.innerWidth + 'px';
          canvas.style.height = window.innerHeight + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
      }
      loadingBar.style.display = 'block';
      var script = document.createElement('script');
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + '%';
        })
          .then((unityInstance) => {
            loadingBar.style.display = 'none';
            document.querySelector('#loading-text').remove();
          })
          .catch((message) => {
            alert(message);
          });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
