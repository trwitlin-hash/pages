<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var t=localStorage.getItem('sgFrameToken'), e=parseInt(localStorage.getItem('sgFrameExp')||0);
  if(t && Date.now()<e){ localStorage.removeItem('sgFrameToken'); localStorage.removeItem('sgFrameExp'); }
  else if(!sessionStorage.getItem('sgUnlockedSession')){ location.replace('/index.html'); }
})();
</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garden Gnomes</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/game.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #fpdoodle { display: flex; align-items: flex-start; justify-content: center; }
    #gamewrapper { transform-origin: top center; }
  </style>
</head>
<body>
  <div id="fpdoodle">
    <div id="gamewrapper">
      <div id="game" tabindex="0">
        <div id="gameOverlay"></div>
      </div>
    </div>
  </div>
  <script src="js/createjs.js"></script>
  <script src="js/game.js"></script>
  <script>
    (function () {
      function fit() {
        var el = document.getElementById('gamewrapper');
        if (!el || !el.offsetWidth) { setTimeout(fit, 300); return; }
        var s = Math.min(1, window.innerWidth / el.offsetWidth, window.innerHeight / el.offsetHeight);
        el.style.transform = s < 0.99 ? 'scale(' + s.toFixed(4) + ')' : '';
      }
      window.addEventListener('load', function () { fit(); setTimeout(fit, 800); setTimeout(fit, 2000); });
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
