<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="gf" src="https://mountain658.github.io/g/zceleste.html" allowfullscreen allow="fullscreen *; gamepad *"></iframe>
  <!-- Fullscreen button — PICO-8's internal button can't escape an iframe, so we provide our own -->
  <button id="fsBtn" title="Fullscreen" style="
    position:fixed;top:8px;right:8px;z-index:999;
    background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:4px;
    font-size:18px;width:32px;height:32px;cursor:pointer;line-height:1;
  ">⛶</button>
  <script>
    var f = document.getElementById('gf');
    // Auto-focus iframe so keyboard works without clicking first
    f.addEventListener('load', function() { f.focus(); });
    window.addEventListener('load', function() { f.focus(); });

    // Fullscreen: expand the iframe element itself
    document.getElementById('fsBtn').addEventListener('click', function() {
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      if (req) req.call(el);
    });

    // Controls hint
    var hint = document.createElement('div');
    hint.style.cssText = 'position:fixed;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);color:#fff;font:13px/1.5 sans-serif;padding:6px 14px;border-radius:6px;pointer-events:none;z-index:999;transition:opacity 1s';
    hint.textContent = '🎮 Arrow keys: move  •  Z: jump  •  X: dash  •  Enter: pause';
    document.body.appendChild(hint);
    setTimeout(function(){ hint.style.opacity = '0'; }, 5000);
  </script>
</body>
</html>
