<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Geometry Dash Classic Unblocked</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />

    <link rel="manifest" href="appmanifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png" />
    <link rel="apple-touch-icon" sizes="256x256" href="icons/icon-256.png" />
    <link rel="icon" type="image/png" href="icons/icon-256.png" />
    <script src="/js/load.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body style="overflow: hidden">
    <div id="fb-root"></div>

    <script src="c2runtime.js"></script>
    <script src="start.js"></script>
    <script>
      // Map spacebar → mousedown/mouseup on document (where C2 registers its listener)
      document.addEventListener('keydown', function(e) {
        if (e.code === 'Space' || e.keyCode === 32) {
          e.preventDefault();
          var opts = { bubbles: true, cancelable: true, button: 0, buttons: 1, clientX: 1, clientY: 1 };
          document.dispatchEvent(new MouseEvent('mousedown', opts));
          document.dispatchEvent(new MouseEvent('mouseup',   opts));
          document.dispatchEvent(new MouseEvent('click',     opts));
        }
      });
    </script>
  </body>
</html>
