<!DOCTYPE html>
<html>
  <head>
    <script src="/js/load.js"></script>
    <meta charset="utf-8" />
    <title>Core Ball</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500&amp;display=swap"
      rel="stylesheet"
      type="text/css"
    />
    <style>
      body {
        background-color: #c8c8c8;
        overflow: hidden;
        padding: 0;
        margin: 0;
        /*font-family:Helvetica;*/
        /*font-family: 'Open Sans', sans-serif, Helvetica;*/
        font-family: 'Nunito', sans-serif;
      }

      .center-box {
        text-align: center;
        position: absolute;
        width: 300px;
        height: 400px;
        margin: -200px 0 0 -150px;
        left: 50%;
        top: 50%;
      }

      .title {
        font-size: 50px;
        /*font-family: sans-serif;*/
      }

      .button {
        position: absolute;
        width: 100px;
        height: 100px;
        left: 50%;
        top: 50%;
        margin: -50px 0 0 -50px;
        border: 2px solid #666;
        color: #666;
        -moz-border-radius: 15px;
        -webkit-border-radius: 15px;
        border-radius: 15px;
        font-size: 55px;
      }

      .button .text {
        font-size: 16px;
        padding: 0 10px;
        width: 80px;
      }

      .op {
        position: absolute;
        width: 200px;
        height: 100px;
        left: 50%;
        top: 70%;
        margin: 0px 0 0 -100px;
        display: flex;
        justify-content: flex-start;
        flex-direction: column;
        align-items: center;
      }

      #txtAr svg {
        width: 40px;
        height: 40px;
      }

      #txtAr svg path {
        fill: #666666;
      }
    </style>
  </head>
  <body style="background-color: rgb(184, 17, 28)">
    <canvas
      style="display: none"
      id="stage"
      width="100%"
      height="100%"
    ></canvas>
    <div
      id="begin"
      style="background-color: rgb(200, 200, 200); width: 100%; height: 100%"
    >
      <section class="center-box">
        <h2>Game Start</h2>
        <span class="title">CoreBall</span>
        <div class="button">
          <div id="txtAr">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path
                d="M256 8C119 8 8 119 8 256s111 248 248 248 248-111 248-248S393 8 256 8zm115.7 272l-176 101c-15.8 8.8-35.7-2.5-35.7-21V152c0-18.4 19.8-29.8 35.7-21l176 107c16.4 9.2 16.4 32.9 0 42z"
              ></path>
            </svg>
          </div>
          <div class="text">level 1</div>
        </div>
        <div class="op">
          <a id="btnFW" href="javascript:;"></a>
          <span id="btnReset" style="display: inline-block; color: #666"
            >RESET</span
          >
          <div
            id="tip"
            style="
              font-size: 14px;
              color: #555;
              margin-top: 15px;
              display: none;
            "
          >
            Done
          </div>
        </div>
      </section>
      <section id="wxArrow" style="display: none">
        <h2>Instructions</h2>
        <div
          style="
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.7;
            background-color: #000;
          "
        ></div>
      </section>
    </div>
    <script src="coreball.js"></script>
  </body>
</html>
