<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super Car Driving</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    #unity-container { width:100vw; height:100vh; }
    #unity-canvas { width:100%; height:100%; }
    #unity-loading-bar { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); color:#fff; font-family:sans-serif; text-align:center; }
    #unity-progress-bar-empty { width:200px; height:4px; background:#333; border-radius:2px; margin-top:12px; }
    #unity-progress-bar-full { width:0%; height:100%; background:#2196f3; border-radius:2px; transition:width .2s; }
  </style>
</head>
<body>
  <div id="unity-loading-bar">
    <div>Loading Super Car Driving...</div>
    <div id="unity-progress-bar-empty"><div id="unity-progress-bar-full"></div></div>
  </div>
  <div id="unity-container"><canvas id="unity-canvas" tabindex="-1"></canvas></div>
  <script src="Build/game.loader.js"></script>
  <script>
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/game.data.unityweb",
      frameworkUrl: "Build/game.framework.js.unityweb",
      codeUrl: "Build/game.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Super Car Driving",
      productVersion: "1.0",
    }, function(p) {
      var b = document.getElementById("unity-progress-bar-full");
      if (b) b.style.width = (100*p)+"%";
      if (p===1) { var l=document.getElementById("unity-loading-bar"); if(l) l.style.display="none"; }
    });
  </script>
</body>
</html>
