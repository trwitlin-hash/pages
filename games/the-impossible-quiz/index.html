<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}
    ruffle-player{width:100%;height:100%;display:block}
    #debug{position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,0.88);color:#0f0;font:12px/1.6 monospace;padding:8px 10px;z-index:9999;max-height:60vh;overflow-y:auto;pointer-events:none}
    #debug b{color:#ff0}
    #debug .err{color:#f55}
    #debug .ok{color:#5f5}
    #debug .warn{color:#fa0}
  </style>
</head>
<body>
  <div id="debug"><b>🔍 Ruffle Debug</b><br></div>
  <ruffle-player id="rufflePlayer" src="Build/impossiblequiz.swf" width="100%" height="100%"></ruffle-player>

  <script>
    var dbg = document.getElementById('debug');
    function log(msg, cls) {
      var line = document.createElement('div');
      if (cls) line.className = cls;
      line.innerHTML = msg;
      dbg.appendChild(line);
    }

    window.onerror = function(msg, src, line, col, err) {
      log('❌ JS Error: ' + msg + ' @ ' + src + ':' + line, 'err');
    };
    window.addEventListener('unhandledrejection', function(e) {
      log('❌ Promise rejection: ' + (e.reason || e), 'err');
    });
  </script>

  <script src="../../js/ruffle/ruffle.js" onerror="log('❌ ruffle.js failed to load', 'err')"></script>

  <script>
    var player = document.getElementById('rufflePlayer');

    // Ruffle internal log/error events
    if (player) {
      player.addEventListener('ruffle:log', function(e) {
        log('ℹ️ Ruffle: ' + (e.detail && e.detail.message), 'warn');
      });
      player.addEventListener('ruffle:error', function(e) {
        log('❌ Ruffle error: ' + (e.detail && e.detail.message), 'err');
      });
    }

    // Check wasm MIME type — this is the most common silent failure
    var wasmFiles = [
      '/js/ruffle/f43c699a5c29c60ca554.wasm',
      '/js/ruffle/d46943bc2c5d628dd63d.wasm'
    ];
    wasmFiles.forEach(function(wf) {
      fetch(wf, {method:'HEAD'}).then(function(r) {
        var ct = r.headers.get('content-type') || '(no content-type)';
        var ok = ct.includes('wasm');
        log((ok ? '✅' : '❌') + ' WASM ' + wf.split('/').pop() + ' → HTTP ' + r.status + ' | Content-Type: ' + ct, ok ? 'ok' : 'err');
        if (!ok) log('  ⚠️ wasm must be application/wasm — netlify.toml header may not be applying', 'err');
      }).catch(function(e) { log('❌ WASM fetch error: ' + e, 'err'); });
    });

    // Check core ruffle JS chunks
    var coreChunks = [
      '/js/ruffle/core.ruffle.bbf4e6b46a304d18b873.js',
      '/js/ruffle/core.ruffle.6a2fe576a9d3122ce698.js'
    ];
    coreChunks.forEach(function(c) {
      fetch(c, {method:'HEAD'}).then(function(r) {
        log((r.ok ? '✅' : '❌') + ' Chunk ' + c.split('/').pop() + ' → HTTP ' + r.status, r.ok ? 'ok' : 'err');
      }).catch(function(e) { log('❌ Chunk error: ' + e, 'err'); });
    });

    // Try loading wasm as WebAssembly directly to see the real browser error
    fetch('/js/ruffle/f43c699a5c29c60ca554.wasm')
      .then(function(r) { return r.arrayBuffer(); })
      .then(function(buf) {
        return WebAssembly.compile(buf);
      })
      .then(function() { log('✅ WebAssembly.compile succeeded — wasm is valid', 'ok'); })
      .catch(function(e) { log('❌ WebAssembly.compile failed: ' + e, 'err'); });

    // Delayed status check
    setTimeout(function() {
      log('--- 3s check ---', 'warn');
      if (typeof window.RufflePlayer === 'undefined') {
        log('❌ RufflePlayer still undefined', 'err');
      } else {
        log('✅ RufflePlayer defined', 'ok');
        // Check player readyState
        var p = document.getElementById('rufflePlayer');
        log('Player readyState: ' + (p && p.readyState));
        log('Player loadedConfig: ' + JSON.stringify(p && p.config));
      }
    }, 3000);
  </script>
</body>
</html>
