<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  var t=localStorage.getItem('sgFrameToken'), e=parseInt(localStorage.getItem('sgFrameExp')||0);
  if(t && Date.now()<e){ localStorage.removeItem('sgFrameToken'); localStorage.removeItem('sgFrameExp'); }
  else if(!sessionStorage.getItem('sgUnlockedSession')){ location.replace('/index.html'); }
})();
</script>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Solitaire</title>
  <link rel="stylesheet" href="css/game.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #fff; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
  </style>
</head>
<body>
  <script src="js/game.js"></script>
  <script>
    (function () {
      function fit() {
        var el = document.querySelector('canvas, #game, [id*="game"]');
        if (!el || !el.offsetWidth) { setTimeout(fit, 300); return; }
        var root = el.parentElement || el;
        var s = Math.min(1, window.innerWidth / root.offsetWidth, window.innerHeight / root.offsetHeight);
        if (s < 0.99) { root.style.transformOrigin = 'top center'; root.style.transform = 'scale(' + s.toFixed(4) + ')'; }
      }
      window.addEventListener('load', function () { setTimeout(fit, 1000); setTimeout(fit, 3000); });
      window.addEventListener('resize', fit);
    })();
  </script>
</body>
</html>
