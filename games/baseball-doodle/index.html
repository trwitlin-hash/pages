<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Google Baseball</title>
  <link rel="stylesheet" href="css/game.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #hplogo { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    #hpcanvas { max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <div id="hplogo"><canvas id="hpcanvas"></canvas></div>
  <!-- Stub elements the game checks for but doesn't need to render -->
  <div id="fpdoodle" style="display:none"></div>
  <div id="lga" style="display:none"></div>
  <form id="searchform" style="display:none"><input id="fkbx"></form>
  <div id="xjsc" style="display:none"></div>
  <div id="hplogoshareved" style="display:none"></div>
  <div id="hplogoved" style="display:none"></div>
  <script src="js/game.js"></script>
</body>
</html>
