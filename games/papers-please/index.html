<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, shrink-to-fit=no"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black; /* letterbox background */
      }

      .game-wrapper {
        width: 960px;
        height: 434px;
        position: absolute;
        top: 50%;
        left: 50%;
      }
    </style>
  </head>
  <body>
    <script src="/js/ruffle/ruffle.js"></script>
    <script src="/js/load.js"></script>

    <div class="game-wrapper" id="game">
      <object width="960" height="434">
        <param name="movie" value="Build/PapersPlease2.swf" />
        <embed src="Build/PapersPlease2.swf" width="960" height="434" />
      </object>
    </div>

    <script>
      function resise() {
        const game = document.getElementById('game');
        const scale = Math.min(
          window.innerWidth / 960,
          window.innerHeight / 434
        );
        game.style.transform = `translate(-50%, -50%) scale(${scale})`;
      }

      window.addEventListener('resize', resise);
      resise();
    </script>
  </body>
</html>
